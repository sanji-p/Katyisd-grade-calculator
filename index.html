<!DOCTYPE html>
<html lang="en">
<head>
  <title>Katy Grade Calculator</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" >
  <link href="style.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="banner">
    <div class="banner-content">
      <h2>Katy Grade Calculator</h2>
      <p>Calculate your grades instantly</p>
    </div>
  </div>
  <div class="container">
    <div class="content">
      <h1 class="title">Katy Grade Calculator</h1>
      <div class="right_side">
        <label>Class Type</label>
        <select id="classType">
        <option value="kap">KAP</option>
        <option value="ap">AP</option>
        <option value="aca">ACA</option>
        </select>
        <input type="text" id="other" placeholder="Other Grades">
        <input type="text" id="minor" placeholder="Minor Grades">
        <input type="text" id="major" placeholder="Major Grades">
        <button type="button" onclick="showResult()">Calculate</button>
      </div>
    </div>
  </div>
  <div id="popup" class="popup">
  <div class="popup-content">
    <h2>Your Final Grade</h2>
    <p id="popupResult"></p>
    <button onclick="closePopup()">Close</button>
  </div>
</div>  
  <script src="script.js">
  </script>
</body>
</html>
